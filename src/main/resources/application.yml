spring:
  application:
    name: apr-backend-assignment
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:buddy;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: username
    password: password

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
      format_sql: true

  jackson:
    serialization:
      write-dates-with-zone-id: false
      write-date-timestamps-as-nanoseconds: false
    time-zone: UTC

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  friend:
    max-limit: 10000