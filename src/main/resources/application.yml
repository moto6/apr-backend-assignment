spring:
  application:
    name: apr-backend-assignment
  profiles:
    active: local

  datasource:
    url: jdbc:h2:mem:buddy;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: username
    password: password



  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
      format_sql: true

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace

  h2:
    console:
      enabled: true
      path: /h2-console