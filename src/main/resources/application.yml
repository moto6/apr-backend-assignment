spring:
  application:
    name: apr-backend-assignment

  datasource:
    url: jdbc:h2:mem:buddy
    driver-class-name: org.h2.Driver
    username: username
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
      format_sql: true

  #  server:
  #    port: 8080

  logging:
    level:
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace